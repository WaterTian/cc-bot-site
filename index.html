<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting to sintbot.com</title>
    <link rel="canonical" href="https://sintbot.com/" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=https://sintbot.com/" />
    <script>
      // preserve any query string / hash when forwarding
      location.replace("https://sintbot.com/" + location.search + location.hash);
    </script>
    <style>
      body {
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        background: #0a0a0a;
        color: #e8e8e8;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      a { color: #ff6b35; }
    </style>
  </head>
  <body>
    <p>This site has moved to <a href="https://sintbot.com/">sintbot.com</a> …</p>
  </body>
</html>
